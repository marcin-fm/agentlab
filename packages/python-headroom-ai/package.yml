name: python-headroom-ai
status: blocked
blockers:
  - Upstream v0.32.0 has no bounded MCP-only feature; the unmodified Python package exposes the full CLI and network-capable MCP transports, so the former stdio-only security boundary no longer applies.
  - The Fedora rusqlite 0.31 compatibility adaptation requires clean Fedora 43/44 build and behavior proof.
  - The candidate aggregate SPDX expression must be regenerated and confirmed from the selected Fedora 43/44 buildroot closures before publication.
  - Base Python runtime dependencies and the remaining unconditional hf-hub path require provider and runtime-network review.
dependency_status:
  python_runtime:
    - tiktoken >= 0.5
    - pydantic >= 2
    - litellm >= 1.86.2, < 2 on Python below 3.14
    - click >= 8.3.3
    - rich >= 13
    - opentelemetry-api >= 1.24
    - ast-grep-cli >= 0.30
    - pyyaml >= 6 and tomlkit >= 0.13, < 1
    - mcp >= 1 with httpx, starlette, and uvicorn from the selected mcp extra
  native_runtime:
    - PyO3 0.29 and pyo3-log 0.13
    - tokenizers 0.22 and hf-hub 0.4
    - tiktoken-rs 0.11 through rust-tiktoken-rs0.11 and fancy-regex 0.17
    - rusqlite 0.31 against system SQLite through a Fedora compatibility patch
    - unidiff 0.4 from the completed rust-unidiff0.4 package
  excluded_surfaces:
    - headroom-core ml feature, including fastembed, Magika, and ORT
    - optional Rust Redis feature
duplicate_check:
  checked: "2026-07-18"
  fedora_43_44: absent
  rpm_fusion_43_44: absent
network_policy:
  transport: unresolved; upstream mcp command supports stdio and streamable HTTP
  proxy: unresolved; upstream proxy and fallback paths remain present
  update_check: upstream CLI behavior remains present
  model_assets: native ml feature is disabled, but unconditional hf-hub capability remains under review
  rpm_build: offline after source and dependency acquisition
