name: python-headroom-ai
status: blocked
blockers:
  - Updated project policy places the custom mcp-minimal feature graph under substantive-rework hold; do not rebuild, enable, or publish until an upstream-supported feature selection replaces it or the maintainer explicitly approves it.
  - The binary RPM needs an aggregate SPDX review for its statically linked Rust closure before any future validation build.
  - Exact Rust tokenization and its compatibility drafts remain dependent-scope evidence only until the Headroom surface is re-selected.
dependency_status:
  python_runtime:
    - tiktoken >= 0.5
    - pydantic >= 2
    - click >= 8.1
    - opentelemetry-api >= 1.24
    - mcp >= 1; accepted only through the reviewed stdio/no-task boundary
  native_runtime:
    - PyO3 0.27.2 and pyo3-log 0.13
    - tokenizers 0.22 with local tokenizer loading only
    - rusqlite 0.31 built against system SQLite
    - unidiff 0.4 from the completed rust-unidiff0.4 package
  excluded_surfaces:
    - fastembed, Magika, ORT, and Hugging Face downloads
    - Redis, proxy/provider commands, update checks, and the optional file-read tool
    - litellm, rich, ast-grep-cli, sqlite-vec, and proxy/model Python extras
duplicate_check:
  checked: "2026-07-17"
  fedora_43_44: absent
  rpm_fusion_43_44: absent
network_policy:
  transport: stdio only
  proxy: disabled; no health, retrieve, or statistics fallback
  update_check: removed from the packaged CLI path
  model_assets: native model and runtime-download branches are not compiled
  tokenizer_downloads: from_pretrained fails closed; audited local files remain supported
  file_read_tool: disabled even when HEADROOM_MCP_READ is set
  rpm_build: offline after source and dependency acquisition
build_validation:
  release: 0.31.0-0.3
  status: unbuilt draft under substantive-rework hold
  prior_release: 0.31.0-0.1
  source_sha256_verified: true
  spec_parse: passed
  prior_mock_fedora_43: clean build and packaged stdio MCP smoke passed for 0.31.0-0.1
  prior_mock_fedora_44: clean build and packaged stdio MCP smoke passed for 0.31.0-0.1
  prior_native_tests: 836 library tests, 7 CCR backend tests, and 2 tokenizer property tests passed per chroot; 1 library test ignored
  prior_mcp_smoke: initialize, exact tool list, compression, byte-identical retrieval, local miss, and statistics passed
  prior_rpmlint: zero errors and one expected no-manual-page warning per chroot
