name: python-headroom-ai
status: enabled
blockers: []
dependency_status:
  python_runtime:
    - tiktoken >= 0.5
    - pydantic >= 2
    - litellm >= 1.86.2, < 2 on Python below 3.14
    - click >= 8.3.3
    - rich >= 13
    - opentelemetry-api >= 1.24
    - ast-grep >= 0.30 from the source-built Agentlab system package
    - pyyaml >= 6 and tomlkit >= 0.13, < 1
    - mcp >= 1 with httpx, starlette, and uvicorn from the selected mcp extra
    - fastapi >= 0.100 for the upstream CLI registration import path
  native_runtime:
    - PyO3 0.29 and pyo3-log 0.13
    - tokenizers 0.22 and hf-hub 0.4
    - tiktoken-rs 0.11 through rust-tiktoken-rs0.11 and fancy-regex 0.17
    - rusqlite 0.31 against system SQLite through a Fedora compatibility patch
    - unidiff 0.4 from the completed rust-unidiff0.4 package
  excluded_surfaces:
    - headroom-core ml feature, including fastembed, Magika, and ORT, removed from selected Cargo metadata
    - optional Rust Redis feature removed from selected Cargo metadata
