target_release: 0.32.0
production_runtime:
  python:
    - tiktoken >= 0.5.0
    - pydantic >= 2.0.0
    - litellm >= 1.86.2, < 2.0 on Python below 3.14
    - click >= 8.3.3
    - rich >= 13.0.0
    - opentelemetry-api >= 1.24.0
    - ast-grep-cli >= 0.30.0
    - pyyaml >= 6.0
    - tomlkit >= 0.13.0, < 1.0
    - mcp >= 1.0.0 with httpx, starlette, and uvicorn
  rust_selected:
    - pyo3 >= 0.29, < 0.30 with abi3-py310 and extension-module
    - pyo3-log >= 0.13, < 0.14
    - tokenizers >= 0.22, < 0.23
    - hf-hub >= 0.4, < 0.5 with ureq and rustls-tls
    - tiktoken-rs >= 0.11, < 0.12 using rust-tiktoken-rs0.11
    - fancy-regex >= 0.17, < 0.18 using rust-fancy-regex0.17
    - rusqlite >= 0.31, < 0.32 using system SQLite through a compatibility patch
    - unidiff >= 0.4, < 0.5 using rust-unidiff0.4
    - Fedora-provided serde, serde_json, bytes, thiserror, tracing, digest, compression, regex, rayon, toml, and blake3 branches
excluded_runtime:
  rust:
    - fastembed, magika, ort, and ort-sys through disabled headroom-core ml defaults
    - redis through the unselected optional feature
  python:
    - optional proxy, ML, memory, relevance, image, voice, and other non-mcp extras
build_runtime:
  backend: maturin >= 1.5, < 2.0
  native_extension: crates/headroom-py with no default features and PyO3 feature extension-module
  license_workspace: root Cargo workspace narrowed to headroom-core and headroom-py for Fedora cargo2rpm accounting
  system_libraries:
    - pkgconfig(sqlite3)
  local_packages:
    - rust-unidiff0.4 = 0.4.0
    - rust-fancy-regex0.17 = 0.17.0
    - rust-tiktoken-rs0.11 = 0.11.0
validation:
  current_draft:
    release: 0.32.0-0.8
    status: pending configured-SCM six-cell build and artifact proof
    static_validation: exact-archive zero-fuzz patch application, scoped Cargo metadata and license probing, RPM spec parsing, YAML parsing, and repository tests passed
    source_license_probe: 240 target-all package/version records for headroom-core and headroom-py; fastembed and aws-config are absent
    license_breakdown_records: 207
    candidate_license: Apache-2.0 AND BSD-2-Clause AND BSD-3-Clause AND CDLA-Permissive-2.0 AND ISC AND MIT AND MPL-2.0 AND Unicode-3.0
    buildroot_license_gate: target builds must regenerate LICENSE.dependencies from the provider-selected closure
    system_sqlite_gate: target checks must prove the extension links Fedora libsqlite3 without RPATH or RUNPATH
    installed_smoke_gate: target checks must import the Python package and run the installed CLI help path
  prior_release_0_1:
    fedora_43:
      mock: passed
      native_tests: 836 library, 7 CCR backend, and 2 tokenizer property tests passed; 1 ignored
      mcp: initialize, exact three-tool list, compression, retrieval, local miss, and statistics passed
    fedora_44:
      mock: passed
      native_tests: 836 library, 7 CCR backend, and 2 tokenizer property tests passed; 1 ignored
      mcp: initialize, exact three-tool list, compression, retrieval, local miss, and statistics passed
