name: playwright-mcp
status: blocked
blockers:
  - The root lock has 679 integrity-pinned registry tarballs; 624 across 572 package names are eligible on Fedora Linux/x86_64. Fedora 43/44 provide no exact locked npm version and RPM Fusion provides no reusable npm capability, so the active root closure still needs immutable offline sources. The separate stable-test-runner lock is source-proven and only three packages on Linux, but its npm ci remains unskippable.
  - Playwright exposes no package or MCP-only build target; the normal monorepo build cannot skip the stable-test-runner npm ci.
  - Exact source-built esbuild 0.28.1 is feasible through the upstream and Fedora packaging pattern, but Fedora 43/44 provide only 0.24.2/0.27.2 and no exact compatibility provider exists yet.
  - Vite 8.1 requires source-built Rolldown 1.1.3 and Lightning CSS 1.32.0 N-API providers. Their actual Linux roots require 239/92 registry crates; semver- and feature-aware Fedora comparison leaves 80-81/20 unresolved provider edges.
  - Candidate aggregate SPDX expressions are derived for the actual Rolldown and Lightning CSS roots. Repository or canonical texts resolve 59 of 62 crate-archive omissions; exhaustive history and release checks confirm that base-encode, json-escape-simd, and parcel_sourcemap still lack the required MIT notice.
  - Ten browser-logo dependencies have no npm license metadata or tarball notice. Their exact source repository excludes the logos from its MIT grant, and all ten marks ship in the generated Playwright Core dashboard; explicit redistribution/trademark review or an upstream-supported omission is required.
  - The audited immutable closure has not been hosted for offline COPR SCM builds.
source_policy:
  npm_package: "@playwright/mcp"
  source_correspondence: All seven npm files byte-match tag v0.0.78. Playwright alpha tarballs identify source commit 9fb36027c64c8edcf08bf06f618b3ca97a7b0d97.
  playwright_source_archive_sha256: 446cdbeb45255cc6e26fdf2ae604cd04fe77f4402b60fc0bd4b6edd302bcff46
  generated_build: Full Playwright monorepo build with esbuild, Vite, generated types/assets, copied xdg-open, and a separate stable-test-runner install.
  root_npm_provider_audit: Of 679 locked registry entries, 624 across 572 names are Linux/x86_64 eligible. Fedora 43/44 have zero exact locked providers and only colors, esbuild, punycode, and undici at different versions; RPM Fusion has no npm provider.
  stable_test_runner: Four lock entries; Linux uses three Apache-2.0 Playwright packages with npm SLSA provenance to commit e9a206539527957abd177749dd893939d3c6c85c. Optional fsevents is Darwin-only, and no Linux install or browser-download script is present.
  narrow_build_target: none; --disable-install only affects browser installation in watch mode
  esbuild_source_path: Exact 0.28.1 Go binary and neutral npm module can be source-built; Fedora uses the same binary plus JavaScript/platform-module layout for older releases.
  required_native_build_tools: Exact source-built esbuild 0.28.1, Rolldown 1.1.3, and Lightning CSS 1.32.0; optional DuckDB and Darwin fsevents are excluded.
  native_provider_audit: Rolldown has 80 unresolved Fedora 43 edges and 81 on Fedora 44, including explicit tracing/valuable and tracing-core/valuable gaps; Lightning CSS has 20 on each release and no missing feature provider.
  native_license_candidates: Rolldown is Apache-2.0 AND BSD-2-Clause AND BSL-1.0 AND CC0-1.0 AND ISC AND MIT AND Unicode-3.0 AND Zlib; Lightning CSS is Apache-2.0 AND MIT AND MPL-2.0 AND Unicode-3.0. Immutable repository or canonical texts cover 59 of 62 active crate-archive omissions; three MIT-only notices remain unresolved.
  browser_install_scripts: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 is an upstream-supported no-download path.
  bundle_license_sidecars: Five published sidecars map 213 bundled package entries to exact root-lock versions.
  browser_logo_assets: Ten active root-lock packages lack license metadata; their exact source legal statement reserves the marks to their owners and excludes them from the repository MIT grant. Six logos are inlined and four are separate SVGs in the published dashboard, so distribution remains review-blocked.
  browser: Fedora chromium-headless only
  browser_compatibility: Exact MCP wrapper ran over stdio with Fedora 44 chromium-headless 150.0.7871.114, listed 24 tools, and passed local data-URL navigation and evaluation; repeat from packaged RPMs in F43/F44 after source closure.
  browser_downloads: forbidden
  lifecycle_scripts: forbidden
  networked_npm_install: forbidden
  native_payloads: forbidden until inventoried and source-proven
