name: playwright-mcp
status: blocked
blockers:
  - The exact reusable nodejs-playwright and nodejs-playwright-core providers remain blocked on their monorepo source, build, license, and immutable-closure gates.
  - The released CLI exposes HTTP/SSE, remote/CDP/extension modes, optional capabilities, unrestricted filesystem controls, config/environment overrides, and an install-browser alias with no upstream bounded-profile switch.
  - The exact default 24-tool surface unconditionally includes browser_run_code_unsafe. The published runtime reached host process and fs through the live page object, and upstream provides no per-tool exclusion mechanism.
  - Packaged Fedora 43 and Fedora 44 integration through the exact split module providers has not been proven.
source_policy:
  npm_package: "@playwright/mcp"
  source_correspondence: All seven npm files byte-match tag v0.0.78.
  build: The released build script is a no-op; install the complete published public module after the provider and policy gates pass.
  runtime_providers:
    playwright_npm_version: 1.62.0-alpha-1783623505000
    playwright_rpm_capability: 1.62.0~alpha.1783623505000
    source_package: nodejs-playwright
    binary_packages: nodejs-playwright and nodejs-playwright-core
  installed_metadata_boundary: The scoped root does not trigger Fedora's current Node file attribute, so npm(@playwright/mcp) is declared manually.
  browser: Fedora chromium-headless only
  browser_compatibility: Exact MCP wrapper ran over stdio with Fedora 44 chromium-headless 150.0.7871.114, listed 24 tools, and passed local data-URL navigation and evaluation.
  browser_downloads: forbidden
  lifecycle_scripts: forbidden
  networked_package_manager: forbidden
  selected_command_profile: playwright-mcp --browser chromium --headless --isolated --executable-path /usr/lib64/chromium-browser/headless_shell --image-responses omit
  command_surface_enforcement: unavailable upstream
  default_tool_boundary: Exactly 24 tools; browser_run_code_unsafe is unconditional core and no per-tool exclude exists.
  unsafe_tool_runtime_proof: Exact published CLI and Core bundles escaped the vm through the live page object, accessed host process and fs, wrote a marker with content SHA-256 d74568fdd4ec92e9d21cf2c2c8d407690f747bfa5fc06575e4561e0aecde2933, and removed it after verification.
