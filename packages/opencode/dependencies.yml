gates:
  - Recompute the complete closure and all counts for target_release before enabling.
  - Parse the tagged release bun.lock without resolving new versions.
  - Download original npm source tarballs, separate production/build from test inputs, and verify lockfile integrity values.
  - Reject prebuilt executables, shared objects, native addons, and opaque generated code.
  - Record source URLs, SHA-256 values, SPDX licenses, lifecycle scripts, and patches.
  - Reconstruct the dependency tree deterministically with networking disabled.
  - Publish or otherwise expose immutable checksummed closure source archives to COPR SCM builds without build-time resolution.
  - Generate manual versioned bundled(nodejs-<npm-name>) Provides for entries embedded in the standalone executable.
  - Record system-library decisions and required public upstream contacts.
  - Build every required Linux native component from source.
  - Run offline unit and smoke checks in a clean Fedora buildroot.
