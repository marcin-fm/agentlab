---
name: rust-v8
status: blocked
blockers:
- The stable Fedora Rust and GCC portability changes are local zero-fuzz patches and have not been submitted or accepted upstream.
- Exact-source review confirms that Rusty V8 exposes only a complete static GN target and its Cargo build script always links `static=rusty_v8`. V8 component DSOs are a distinct internal boundary; upstream defines no `librusty_v8.so`, SONAME, exported/versioned bridge ABI, or existing-consumer dynamic mode. Agentlab does not add a cross-package shared provider without that upstream contract; this is a package-design decision, not a Fedora prohibition on application-private DSOs.
- The retained Fedora 44 x86_64 1,795-object archive has a complete Fedora-allowed SPDX expression and an exact 24-file license-text map. All 21 dynamically generated commit archives are verified by safe layout and exact component trees rather than compressor-specific bytes; the three unused CC0 SipHash files are removed from the V8 tree and the existing `v8_use_siphash=false` graph is enforced by a narrow patch. The 31 implicit Rust rlibs and system libraries are not embedded and remain final-consumer obligations. Production source-bound builds, other architectures, and any graph change must regenerate this evidence.
- Network-isolated Fedora 43, Fedora 44, and Rawhide builds have not been run. The successful prototype is Fedora 44 x86_64 evidence only, and aarch64 is unverified.
