name: rust-v8
status: blocked
blockers:
- The stable Fedora Rust and GCC portability changes are local zero-fuzz patches and have not been submitted or accepted upstream.
- Candidate legal texts and all 216 real vendored Rust source packages are inventoried, but `v8/third_party/googletest/src/LICENSE` is absent, two Chromium tooling components lack component-local texts, and required-text decisions, Fedora SPDX review, system-library decisions, and the final aggregate License expression remain unresolved.
- Network-isolated Fedora 43, Fedora 44, and Rawhide builds have not been run. The successful prototype is Fedora 44 x86_64 evidence only, and aarch64 is unverified.
