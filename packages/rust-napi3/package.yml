  source_delivery: The direct static registry URL serves the pinned crate bytes without relying on the crates.io API redirect in isolated COPR source builders.
  local_validation: Both patches applied with fuzz 0; a fresh Fedora 44 x86_64 Mock build passed the selected feature build and its one test, all 50 source/binary RPMs passed digest verification and rpmlint, and an offline Mock consumer compiled the selected napi/derive macro surface.
