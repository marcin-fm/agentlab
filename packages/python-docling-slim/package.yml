name: python-docling-slim
status: enabled
blockers: []
source_policy:
  packaged_surface: Base modules plus the service-client extra; upstream command wrappers are removed.
  cli_exclusion: The wrappers import the excluded pypdfium2-backed local conversion path even for --help; docling-mcp consumes the Python service-client API instead.
  service_client_metadata_patch: Removes Typer, Rich, and python-dotenv from the service-client extra because only the omitted command wrappers import them; the client API imports only httpx and websockets.
  excluded_extras:
    - Local PDF parser and pypdfium2 branches.
    - Local IBM models, Torch, Transformers, OCR, VLM, audio, office, and chunking branches.
  network_boundary: The packaged service client performs opt-in network requests only to an explicitly configured Docling service.
  model_downloads: No model dependency or model downloader is activated by the service-client extra.
