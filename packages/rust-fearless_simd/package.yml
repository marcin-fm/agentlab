name: rust-fearless_simd
status: enabled
blockers: []
validation:
  enablement_release: Release 1.1 adapts Fedora's 0.4.1-1 package only for Fedora 43, where Hayro requires fearless_simd 0.4 and the distribution has no provider.
  source_identity: The immutable static crates.io archive matches the pinned SHA-256 and contains the Apache-2.0 and MIT license texts.
  fedora_provenance: Spec and metadata patch are adapted from Fedora commit ae60d4a5155027e05cc9125dc47fc609e31e5917.
  patch_scope: The Fedora patch normalizes the equivalent dual-license expression and removes only unused or unpackaged development dependencies.
upstream:
  provider: crates_io
  crate: fearless_simd
  version_requirement: '>= 0.4.0, < 0.5.0'
  current_version: 0.4.1
  source_url_template: https://static.crates.io/crates/fearless_simd/fearless_simd-{version}.crate
  source_sha256: 011821dd96916694f4133efae9198c02636d185af2ecb51d73ef90cc95429fa2
duplicate_check:
  checked: "2026-07-23"
  fedora_43: absent
  fedora_44: rust-fearless_simd-devel 0.4.1-1.fc44
  fedora_rawhide: compatible rust-fearless_simd 0.4 branch
  rpm_fusion: no matching provider found
fedora_adaptation:
  base_release: "1"
  commit: ae60d4a5155027e05cc9125dc47fc609e31e5917
copr:
  enabled: true
  chroots:
    - fedora-43-x86_64
    - fedora-43-aarch64
  omitted_target_families:
    fedora_44: Fedora 44 provides the exact compatible fearless_simd 0.4.1 crate.
    rawhide: Fedora Rawhide provides the exact compatible fearless_simd 0.4.1 crate.
  subdir: packages/rust-fearless_simd
  spec: rust-fearless_simd.spec
