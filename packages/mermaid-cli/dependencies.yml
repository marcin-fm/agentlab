gates:
  - Build the closure from the published release lockfile and original registry tarballs.
  - Promote exactly Puppeteer 25.2.1 into the production closure without running lifecycle scripts.
  - Reject browser downloads, native addons, shared libraries, executables, and opaque WASM payloads.
  - Verify every registry SHA-512 integrity value and record a SHA-256 for each source tarball.
  - Retain the audited bundled licenses, notices, corresponding sources, and official Font Awesome release data.
  - Reconstruct Source1-Source6 during configured-SCM SRPM generation and reject any output that differs from the audited checksums.
  - Retain the public upstream distribution-packaging contact and exact bundled dependency metadata.
