  crate: hayro-jpeg2000
  version_requirement: '>= 0.3.0, < 0.4.0'
  current_version: 0.3.5
  source_url_template: https://static.crates.io/crates/hayro-jpeg2000/hayro-jpeg2000-{version}.crate
  source_sha256: c75ab947623ef4ccaa7acf0579edf7cbb5a73838e3839a7be73335e522f433a1
duplicate_check:
  checked: "2026-07-23"
  fedora_43: absent
  fedora_44: rust-hayro-jpeg2000-devel 0.3.5-1.fc44
  fedora_rawhide: compatible rust-hayro-jpeg2000 0.3 branch
  rpm_fusion: no matching provider found
fedora_adaptation:
  base_release: "1"
  commit: 34ef88922dc4d3218fe3c9caebcb33282ccfaf5a
copr:
  enabled: true
  chroots:
    - fedora-43-x86_64
    - fedora-43-aarch64
  omitted_target_families:
    fedora_44: Fedora 44 provides a compatible hayro-jpeg2000 0.3 crate for Kreuzberg.
    rawhide: Fedora Rawhide provides a compatible hayro-jpeg2000 0.3 crate for Kreuzberg.
  subdir: packages/rust-hayro-jpeg2000
  spec: rust-hayro-jpeg2000.spec
