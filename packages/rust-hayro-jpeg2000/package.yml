name: rust-hayro-jpeg2000
status: enabled
blockers: []
validation:
  enablement_release: Release 1.1 adapts Fedora's 0.3.5-1 package only for Fedora 43, where Kreuzberg requires hayro-jpeg2000 0.3 and the distribution has no provider.
  source_identity: The immutable static crates.io archive matches the pinned SHA-256 and contains the Apache-2.0, MIT, and CC0-1.0 license texts.
  fedora_provenance: Spec and metadata patch are adapted from Fedora commit 34ef88922dc4d3218fe3c9caebcb33282ccfaf5a.
  patch_scope: The Fedora patch records the CC0 assets in crate metadata and removes only the unused indicatif development dependency.
upstream:
