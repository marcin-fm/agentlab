name: Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/validate.yml"
      - "archived/**"
      - "config/**"
      - "packages/**"
      - "scripts/**"
      - "test/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/validate.yml"
      - "archived/**"
      - "config/**"
      - "packages/**"
      - "scripts/**"
      - "test/**"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - name: Validate package metadata
        run: scripts/check-packages
      - name: Run tests
        run: ruby -Itest test/test_agentlab.rb
